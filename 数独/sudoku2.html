<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>数独グリッド2</title>
    <style>
      /* 盤面全体 */
      .sudoku {
        display: grid;
        grid-template-columns: repeat(9, 1fr);
        grid-template-rows: repeat(9, 1fr);
        width: 360px; /* 例として360px四方 */
        height: 360px;
        border: 3px solid #000; /* 外枠 */
      }

      /* 各セル */
      .cell {
        border: 1px solid #000; /* 基本の枠線 */
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 1.2rem;
      }

      /* 3セルごとの縦ブロック境界（太い右枠線） */
      .cell:nth-child(3n) {
        border-right: 3px solid #000;
      }

      /* 3セルごとの横ブロック境界（太い下枠線） */
      .cell:nth-child(n + 19):nth-child(-n + 27),
      .cell:nth-child(n + 46):nth-child(-n + 54) {
        border-bottom: 3px solid #000;
      }
    </style>
  </head>
  <body>
    <h1>数独のルール</h1>
    <ol>
      <li>
        まだ数字の入っていないマスに1から9までの数字のどれかを1つずつ入れましょう。0（ゼロ）は使いません。
      </li>
      <li>
        9行の各1行ずつ、9列の各1列ずつ、太線で囲まれた3x3のブロック（9つあります）のどれにも、1から9までの数字が1つずつ入るようにします。
      </li>
    </ol>

       <!-- 1マス目 -->
